name: Assistant eval

# Behavioural tool-grounding eval — does Marco call the right tool for data questions, or answer
# from the model's memory? Paid (real model calls) and mildly non-deterministic, so it is NOT a
# per-PR gate. Routing behaviour only changes when its inputs change (persona/prompt, tool
# descriptions, ASSISTANT_MODEL — all under assistant/), so it runs when those land on main —
# tying any failure to the commit that caused it — plus a weekly heartbeat as drift insurance.
# Needs the ANTHROPIC_API_KEY repo secret; without it the eval script skips cleanly (exit 0).
# Trigger manually via the Actions tab (workflow_dispatch) any time.
on:
  push:
    branches: [main]
    paths:
      - 'assistant/**'
      - '.github/workflows/assistant-eval.yml'
  schedule:
    - cron: '0 6 * * 1' # 06:00 UTC Mondays — weekly heartbeat
  workflow_dispatch: {}

jobs:
  eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      # Exit codes from tool-grounding.mjs: 0 = pass (or no key → clean skip),
      # 1 = grounding regression (fail loudly), 2 = the API rejected the call
      # (billing/auth/quota) — the eval never ran, so surface a warning instead of
      # a red run; a lapsed billing account shouldn't send failure mail every night.
      - name: Run eval
        run: |
          set +e
          npm run eval:assistant
          code=$?
          if [ "$code" -eq 2 ]; then
            echo "::warning title=Assistant eval did not run::Anthropic API rejected the call (billing/auth/quota). Fix the account behind the ANTHROPIC_API_KEY secret (console.anthropic.com → Plans & Billing). Grounding was NOT evaluated tonight."
            exit 0
          fi
          exit "$code"
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
